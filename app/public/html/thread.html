<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — GameVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="/" class="nav-logo">
        <span class="logo-icon">🎮</span> GameVault
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">Forum</a>
      </div>
      <div class="nav-user">
        <span class="nav-username" id="nav-username"></span>
        <span class="badge-admin" id="nav-admin-badge" style="display:none">Admin</span>
        <a href="/admin" class="btn btn-ghost btn-sm" id="nav-admin-link" style="display:none">Admin Panel</a>
        <form method="POST" action="/logout" style="margin:0">
          <button type="submit" class="btn btn-logout">Sign Out</button>
        </form>
      </div>
    </nav>
  </header>

  <main class="page">
    <nav class="breadcrumb" id="breadcrumb">
      <a href="/">Forum</a>
      <span class="sep">›</span>
      <a href="#" id="breadcrumb-cat">Category</a>
      <span class="sep">›</span>
      <span id="breadcrumb-thread">Loading…</span>
    </nav>

    <div id="thread-header-container">
      <div class="spinner">Loading article…</div>
    </div>

    <div class="posts-list" id="posts-container"></div>

    <div class="reply-box" id="reply-box" style="display:none">
      <h3>Post a Comment</h3>
      <form id="reply-form">
        <div class="form-group">
          <textarea id="reply-content" placeholder="Write your comment…" rows="5" required></textarea>
        </div>
        <div id="reply-error" style="margin-top:0.5rem"></div>
        <button type="submit" class="btn btn-primary" style="margin-top:0.75rem">Post Comment</button>
      </form>
    </div>
  </main>

  <script src="/js/thread.js"></script>
</body>
</html>
