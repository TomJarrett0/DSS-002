<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — GameVault</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="register-page">

  <div class="login-shell">
    <!-- Form panel -->
    <div class="login-form-panel">
      <h1>Create account</h1>
      <p class="subtitle">Join the GameVault community</p>

      <div id="alert-box"></div>

      <form method="POST" action="/register">
        <div class="field-row">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="3–30 characters, letters/numbers/_"
            autocomplete="username"
            minlength="3"
            maxlength="30"
            required
          >
        </div>

        <div class="field-row">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="field-row">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Minimum 8 characters"
            autocomplete="new-password"
            minlength="8"
            required
          >
        </div>

        <div class="field-row">
          <label for="confirm_password">Confirm password</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Repeat your password"
            autocomplete="new-password"
            minlength="8"
            required
          >
        </div>

        <button type="submit" class="btn-login">Create Account</button>
      </form>

      <div class="login-signup-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>

    <!-- Decorative right panel -->
    <div class="login-deco-panel"></div>
  </div>

  <p class="page-terms">
    By clicking continue, you agree to our
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
  </p>

  <script>
    const ERRORS = {
      missing:         'Please fill in all fields.',
      username_length: 'Username must be between 3 and 30 characters.',
      invalid_email:   'Please enter a valid email address.',
      username_chars:  'Username may only contain letters, numbers and underscores.',
      weak_password:   'Password must be at least 8 characters long.',
      mismatch:        'Passwords do not match.',
      taken:           'That username or email is already registered.',
      server:          'Something went wrong. Please try again later.',
    };

    const params = new URLSearchParams(window.location.search);
    const errKey = params.get('error');
    if (errKey) {
      const msg = ERRORS[errKey] || 'An error occurred. Please try again.';
      const div = document.createElement('div');
      div.className = 'login-alert error';
      div.textContent = msg;
      document.getElementById('alert-box').appendChild(div);
    }
  </script>
</body>
</html>
