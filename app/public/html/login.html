<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GameVault</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">🎮</div>
      <h1>GameVault</h1>
      <p>Sign in to join the discussion</p>
    </div>

    <div id="alert-box"></div>

    <form class="auth-form" method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.7rem;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>

  <script>
    // Show generic error from query param — same message regardless of cause
    // to prevent username enumeration attacks.
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      const div = document.createElement('div');
      div.className = 'alert alert-error';
      div.textContent = 'Invalid username or password. Please try again.';
      document.getElementById('alert-box').appendChild(div);
    }
  </script>
</body>
</html>
