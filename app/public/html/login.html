<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GameVault</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="login-page">

  <div class="login-shell">
    <!-- Form panel -->
    <div class="login-form-panel">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your GameVault account</p>

      <div id="alert-box"></div>

      <form method="POST" action="/login">
        <div class="field-row">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          >
        </div>

        <div class="field-row">
          <div class="field-label-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot your password?</a>
          </div>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn-login">Login</button>
      </form>

      <div class="divider">Or continue with</div>

      <div class="social-btns">
        <button class="social-btn" title="Discord" aria-label="Discord" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
          </svg>
        </button>
        <button class="social-btn" title="Steam" aria-label="Steam" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3.5"/>
            <path d="M12 8.5V5M8.5 12H5M12 15.5V19M15.5 12H19"/>
          </svg>
        </button>
        <button class="social-btn" title="Twitch" aria-label="Twitch" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2H3v16h5v4l4-4h5l4-4V2zM11 11V7M16 11V7"/>
          </svg>
        </button>
      </div>

      <div class="login-signup-footer">
        Don't have an account? <a href="/register">Sign up</a>
      </div>
    </div>

    <!-- Decorative right panel -->
    <div class="login-deco-panel"></div>
  </div>

  <p class="page-terms">
    By clicking continue, you agree to our
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
  </p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const errorCode = params.get('error');
    if (errorCode) {
      const messages = {
        invalid:   'Invalid username or password. Please try again.',
        locked:    'Account temporarily locked due to too many failed attempts. Try again later.',
        suspended: 'Your account has been suspended. Please contact an administrator.',
      };
      const div = document.createElement('div');
      div.className = 'login-alert';
      div.textContent = messages[errorCode] || 'Something went wrong. Please try again.';
      document.getElementById('alert-box').appendChild(div);
    }
  </script>
</body>
</html>
